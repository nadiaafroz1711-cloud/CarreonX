services:
  # 1. FastAPI Backend Service
  - type: web
    name: carreonx-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carreonx-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false # User will add their Vercel URL here
      - key: GEMINI_API_KEY
        sync: false # User will add their Gemini key here

databases:
  # 2. PostgreSQL Database
  - name: carreonx-db
    plan: free
    region: oregon # or your preferred region
